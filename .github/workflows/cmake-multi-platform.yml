name: CMake CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Boost (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev

      - name: Install Boost (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install boost

      - name: Install Boost (Windows)
        if: matrix.os == 'windows-latest'
        run: vcpkg install boost-system boost-filesystem boost-test boost-asio boost-beast --triplet x64-windows

      - name: Cache vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/packages
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cmake -B build -S . \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
              -DVCPKG_TARGET_TRIPLET=x64-windows \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DBoost_ARCHITECTURE=-x64
          else
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure